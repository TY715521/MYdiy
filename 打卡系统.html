<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>考勤打卡系统 v3.2</title>
    <style>
        :root {
            --primary: #2c3e50;
            --success: #27ae60;
            --danger: #e74c3c;
            --gray: #95a5a6;
            --bg: #f5f6fa;
            --card: #ffffff;
            --text: #2c3e50;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #e8ecf1 0%, #d5dbe3 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            background: var(--card);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15), 0 4px 12px rgba(0,0,0,0.08);
            overflow: hidden;
            position: relative;
        }

        .header {
            background: linear-gradient(135deg, #1a73e8, #0d5bbd);
            color: white;
            padding: 20px 24px;
            text-align: center;
        }
        .header .company {
            font-size: 13px;
            opacity: 0.9;
            letter-spacing: 1px;
        }
        .header .system-name {
            font-size: 18px;
            font-weight: 600;
            margin-top: 4px;
        }

        .time-section {
            text-align: center;
            padding: 28px 20px 20px;
            background: #fafbfc;
            border-bottom: 1px solid #eee;
        }
        .time-display {
            font-size: 48px;
            font-weight: 300;
            color: var(--text);
            letter-spacing: 2px;
            font-variant-numeric: tabular-nums;
            font-family: 'SF Mono', 'Menlo', 'Monaco', 'Consolas', monospace;
        }
        .date-display {
            font-size: 14px;
            color: #888;
            margin-top: 4px;
        }

        .punch-area {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 20px;
        }
        .punch-btn {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4CAF50, #45a049);
            border: none;
            color: white;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(76, 175, 80, 0.4);
            transition: all 0.2s ease;
            position: relative;
            letter-spacing: 2px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .punch-btn:active {
            transform: scale(0.95);
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
        }
        .punch-btn .fingerprint {
            font-size: 40px;
            line-height: 1;
        }

        .status-bar {
            text-align: center;
            padding: 0 24px 20px;
            font-size: 13px;
            color: #888;
        }
        .status-bar .overtime {
            color: #e74c3c;
            font-weight: 600;
        }
        .fail-count {
            color: #e67e22;
            font-weight: 600;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.2s ease;
        }
        .modal-overlay.hidden {
            display: none;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal {
            background: white;
            border-radius: 16px;
            width: 90%;
            max-width: 360px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            padding: 24px 20px 20px;
            position: relative;
            animation: slideUp 0.25s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal h3 {
            text-align: center;
            font-size: 17px;
            color: var(--text);
            margin-bottom: 8px;
            font-weight: 600;
        }
        .modal .subtitle {
            text-align: center;
            font-size: 12px;
            color: #999;
            margin-bottom: 18px;
        }
        .modal .modal-content {
            font-size: 13px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 18px;
            text-align: center;
        }

        .btn-row {
            display: flex;
            gap: 12px;
            justify-content: center;
            position: relative;
            min-height: 44px;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 10px;
            border: none;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            min-width: 100px;
            letter-spacing: 1px;
            position: relative;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn.off-work {
            background: #4CAF50;
            color: white;
        }
        .btn.overtime-btn {
            background: #e0e0e0;
            color: #666;
        }
        .btn.off-work.disguised {
            background: #e0e0e0;
            color: #666;
        }
        .btn.overtime-btn.disguised {
            background: #4CAF50;
            color: white;
        }
        .btn.small {
            padding: 8px 16px;
            font-size: 13px;
            min-width: 60px;
        }
        .btn.tiny {
            padding: 4px 10px;
            font-size: 11px;
            min-width: 40px;
        }

        .countdown-bar {
            height: 4px;
            background: #e74c3c;
            border-radius: 2px;
            margin-bottom: 12px;
            transition: width 0.1s linear;
        }

        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color: #999;
            margin: 10px 0;
            justify-content: center;
        }
        .checkbox-row input {
            width: 16px;
            height: 16px;
        }

        .captcha-input {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            text-align: center;
            letter-spacing: 4px;
            margin: 8px 0;
            outline: none;
        }
        .captcha-input:focus {
            border-color: #1a73e8;
        }

        .btn.escaping {
            position: absolute;
            transition: all 0.08s ease;
        }

        .rotating-container {
            animation: rotate 2s linear infinite;
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .btn.transparent-btn {
            opacity: 0.05;
            background: #4CAF50;
            color: white;
        }

        .hint-text {
            font-size: 10px;
            color: #bbb;
            text-align: center;
            margin-top: 6px;
        }

        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25% { transform: translateX(6px); }
            50% { transform: translateX(-6px); }
            75% { transform: translateX(4px); }
        }
        .shaking {
            animation: shake 0.4s infinite;
        }

        @keyframes pulseP {
            0%,100% { transform: scale(1); box-shadow: 0 4px 15px rgba(76,175,80,0.4); }
            50% { transform: scale(1.06); box-shadow: 0 6px 25px rgba(76,175,80,0.6); }
        }

        /* 失败提示弹窗 */
        .fail-modal {
            background: white;
            border-radius: 16px;
            width: 85%;
            max-width: 340px;
            padding: 28px 20px 22px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            animation: slideUp 0.25s ease;
        }
        .modal:has(.fail-modal) {
            background: none;
            border-radius: 0;
            padding: 0;
            box-shadow: none;
            animation: none;
            max-width: none;
            overflow: visible;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .fail-modal .fail-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        .fail-modal .fail-title {
            font-size: 17px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 6px;
        }
        .fail-modal .fail-msg {
            font-size: 13px;
            color: #888;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .fail-modal .fail-btn {
            width: 100%;
            padding: 12px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="app-container" id="appContainer">
        <div class="header">
            <div class="company">🏢 包子科技有限公司</div>
            <div class="system-name">考勤打卡系统 v3.2</div>
        </div>

        <div class="time-section">
            <div class="time-display" id="timeDisplay">--:--:--</div>
            <div class="date-display" id="dateDisplay"></div>
        </div>

        <div class="punch-area">
            <button class="punch-btn" id="punchBtn" onclick="openPunchModal()">
                <span class="fingerprint">🖐️</span>
                点击打卡
            </button>
        </div>

        <div style="text-align:center;padding:8px 0;">
            <button id="cheatToggle" style="padding:6px 16px;font-size:13px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#999;cursor:pointer;" onclick="toggleCheat()">🔧 作弊模式：关</button>
        </div>

        <div class="status-bar">
            <span>今日打卡状态：<span id="punchStatus">待打卡</span></span>
            <br>
            <span>本月累计加班：<span class="overtime" id="overtimeHours">0</span> 小时</span>
            <br>
            <span>打卡异常次数：<span class="fail-count" id="failCount">0</span> 次</span>
        </div>
    </div>

    <div class="modal-overlay hidden" id="modalOverlay">
        <div class="modal" id="modalBox"></div>
    </div>

    <script>
        // =============================================
        // 全局状态
        // =============================================
        let currentLevel = 0;
        let failCount = 0;
        let overtimeHours = 0;
        let modalOpen = false;
        let levelTimers = [];
        let totalLevels = 0;
        let cheatMode = false;

        // =============================================
        // 关卡定义（a-q，共17关）
        // =============================================
        const allLevels = [
            { id: 'a', name: 'a', failMsg: '考勤异常，请重新打卡。<br>提示：下次看清楚再点' },
            { id: 'b', name: 'b', failMsg: '系统检测到您可能被按钮颜色误导。<br>温馨提示：灰色不一定代表禁用' },
            { id: 'c', name: 'c', failMsg: '考勤确认超时。<br>系统已自动为您登记加班，时长：∞' },
            { id: 'd', name: 'd', failMsg: '按钮位置与预期不符。<br>建议：相信直觉，别被表象迷惑' },
            { id: 'e', name: 'e', failMsg: '您未在规定时间内完成操作。<br>那按钮确实越来越小，我们都看见了' },
            { id: 'f', name: 'f', failMsg: '协议未完整阅读。<br>老板的消息：协议第十条后面还有内容，再翻翻' },
            { id: 'g', name: 'g', failMsg: '按钮定位失败。<br>那东西跑得比你的年终奖还快' },
            { id: 'h', name: 'h', failMsg: '考勤确认次数不足或点错了位置。<br>手指累了？这才50下' },
            { id: 'i', name: 'i', failMsg: '安全验证未通过。<br>验证码都给你显示了，删掉996输入正确的很难吗' },
            { id: 'j', name: 'j', failMsg: '确认操作中断。<br>松手太早了，再坚持一下就能下班' },
            { id: 'k', name: 'k', failMsg: '考勤状态异常。<br>那些方块一个都没点对吧？' },
            { id: 'l', name: 'l', failMsg: '选择错误。<br>黑暗中的按钮就像老板的心思，猜不透' },
            { id: 'm', name: 'm', failMsg: '系统防御失败。<br>加班怪突破了防线，今天又是996的一天' },
            { id: 'n', name: 'n', failMsg: '目标识别错误。<br>你射中了加班靶，恭喜获得加班券一张' },
            { id: 'o', name: 'o', failMsg: '检测到未授权离岗行为。<br>老板的目光如炬，你无处可藏' },
            { id: 'p', name: 'p', failMsg: '会议邀请已接受。<br>接下来的2小时你将在一场毫无意义的会议中度过' },
            { id: 'q', name: 'q', failMsg: '面板操作异常。<br>重力感应说：今天宜加班，不宜下班' },
        ];

        // 关卡池
        const beginnerPool = ['b', 'c', 'd', 'e', 'f'];
        const intermediatePool = ['g', 'h', 'i', 'j', 'k', 'l', 'q'];
        const advancedPool = ['m', 'n', 'o', 'p'];
        let selectedLevels = [];

        function generateLevels() {
            const shuffled = (arr) => arr.sort(() => Math.random() - 0.5);
            const result = [{ id: 'a', name: 'a', failMsg: '考勤异常，请重新打卡。<br>提示：下次看清楚再点' }];
            const beginner = shuffled([...beginnerPool]).slice(0, 2);
            const intermediate = shuffled([...intermediatePool]).slice(0, 3);
            const advanced = [...advancedPool];
            const allIds = [...result.map(l => l.id), ...beginner, ...intermediate, ...advanced];
            selectedLevels = allIds.map(id => allLevels.find(l => l.id === id)).filter(Boolean);
            totalLevels = selectedLevels.length;
        }

        // =============================================
        // 时间更新
        // =============================================
        function updateTime() {
            const now = new Date();
            document.getElementById('timeDisplay').textContent = now.toLocaleTimeString('zh-CN', { hour12: false });
            document.getElementById('dateDisplay').textContent = now.toLocaleDateString('zh-CN', {
                year: 'numeric', month: 'long', day: 'numeric', weekday: 'long'
            });
        }
        updateTime();
        setInterval(updateTime, 1000);

        function updateStatusDisplay() {
            document.getElementById('failCount').textContent = failCount;
            document.getElementById('overtimeHours').textContent = overtimeHours;
            document.getElementById('punchStatus').textContent = failCount > 0 ? '打卡异常' : '待打卡';
        }

        function toggleCheat() {
            if (!cheatMode) {
                const pwd = prompt('请输入作弊密码：');
                if (pwd !== '我爱公司') {
                    if (pwd !== null) alert('密码错误，拒绝访问！');
                    return;
                }
            }
            cheatMode = !cheatMode;
            const btn = document.getElementById('cheatToggle');
            if (cheatMode) {
                btn.textContent = '🔓 作弊模式：开';
                btn.style.background = '#4CAF50';
                btn.style.color = '#fff';
                btn.style.borderColor = '#4CAF50';
            } else {
                btn.textContent = '🔧 作弊模式：关';
                btn.style.background = '#fff';
                btn.style.color = '#999';
                btn.style.borderColor = '#ddd';
            }
        }

        function openPunchModal() {
            clearAllTimers();
            modalOpen = true;
            document.getElementById('modalOverlay').classList.remove('hidden');
            renderLevel(selectedLevels[currentLevel]);
            updateStatusDisplay();
        }

        function closeModal() {
            clearAllTimers();
            modalOpen = false;
            document.getElementById('modalOverlay').classList.add('hidden');
            document.getElementById('modalBox').innerHTML = '';
            const outsideBtn = document.getElementById('outsideOffWorkBtn');
            if (outsideBtn) outsideBtn.remove();
        }

        function clearAllTimers() {
            levelTimers.forEach(t => {
                if (t.type === 'interval' && t.id) clearInterval(t.id);
                if (t.type === 'timeout' && t.id) clearTimeout(t.id);
                if (t.type === 'cleanup' && typeof t.fn === 'function') t.fn();
            });
            levelTimers = [];
        }

        // =============================================
        // 失败弹窗
        // =============================================
        function showFailModal(message) {
            const overlay = document.getElementById('modalOverlay');
            overlay.classList.remove('hidden');

            const box = document.getElementById('modalBox');
            
            box.innerHTML = `
                <div class="fail-modal">
                    <div class="fail-icon">⚠️</div>
                    <div class="fail-title">系统提示</div>
                                        <div class="fail-msg">${message}</div>
                    <button class="fail-btn" id="failConfirmBtn">确认</button>
                </div>
            `;

            document.getElementById('failConfirmBtn').onclick = function() {
                overlay.classList.add('hidden');
                box.innerHTML = '';
                modalOpen = false;
                updateStatusDisplay();
            };
        }

        // =============================================
        // 成功弹窗（最后一关）
        // =============================================
        function showSuccessModal() {
            const overlay = document.getElementById('modalOverlay');
            overlay.classList.remove('hidden');

            const now = new Date();
            const box = document.getElementById('modalBox');
            box.innerHTML = `
                <div class="fail-modal">
                    <div class="fail-icon">✅</div>
                    <div class="fail-title">打卡成功</div>
                    <div class="fail-msg">下班时间：${now.toLocaleTimeString('zh-CN', {hour12: false})}<br>今日历经 ${failCount} 次异常</div>
                    <button class="fail-btn" id="successConfirmBtn" style="background:#4CAF50;">确认</button>
                </div>
            `;

            document.getElementById('successConfirmBtn').onclick = function() {
                overlay.classList.add('hidden');
                box.innerHTML = '';
                modalOpen = false;
                currentLevel = 0;
                failCount = 0;
                overtimeHours = 0;
                generateLevels();
                updateStatusDisplay();
            };
        }

        // =============================================
        // 失败/成功处理
        // =============================================
        function handleFail(reason) {
            if (!modalOpen) return;
            failCount++;
            overtimeHours++;
            // 先取当前关卡的失败消息，再重置
            const level = selectedLevels[currentLevel];
            const msg = level ? level.failMsg : '考勤异常，请重新打卡';
            closeModal();
            if (!cheatMode) currentLevel = 0;
            updateStatusDisplay();
            showFailModal(msg);
            console.log(`[失败] ${reason}`);
        }

        function handleSuccess() {
            console.log('[DEBUG handleSuccess] 进入 - modalOpen:', modalOpen, 'currentLevel:', currentLevel, 'totalLevels:', totalLevels);
            if (!modalOpen) { console.log('[DEBUG handleSuccess] modalOpen为false，直接return！'); return; }
            currentLevel++;
            if (currentLevel >= totalLevels) {
                closeModal();
                showSuccessModal();
                currentLevel = 0;
                failCount = 0;
                overtimeHours = 0;
            } else {
                closeModal();
                setTimeout(() => openPunchModal(), 400);
            }
        }

        // =============================================
        // 关卡路由
        // =============================================
        function renderLevel(level) {
            const box = document.getElementById('modalBox');
            box.innerHTML = '';
            switch (level.id) {
                case 'a': renderNormal(box); break;
                case 'b': renderColorSwap(box); break;
                case 'c': renderCountdown(box); break;
                case 'd': renderSwapLoop(box); break;
                case 'e': renderShrinkBtn(box); break;
                case 'f': renderReadConfirm(box); break;
                case 'g': renderEscapingBtn(box); break;
                case 'h': renderClickCount(box); break;
                case 'i': renderCaptcha(box); break;
                case 'j': renderLongPress(box); break;
                case 'k': renderSplitBtn(box); break;
                case 'l': renderSpotlight(box); break;
                case 'm': renderShooter(box); break;
                case 'n': renderFPS(box); break;
                case 'o': renderBossPatrol(box); break;
                case 'p': renderMeetingStorm(box); break;
                case 'q': renderGravityDrawer(box); break;
                default: renderNormal(box);
            }
        }

        // =============================================
        // a - 正常弹窗
        // =============================================
        function renderNormal(box) {
            box.innerHTML = `
                <h3>考勤确认</h3>
                <div class="subtitle">请确认今日考勤状态</div>
                <div class="modal-content">请选择您的考勤状态：</div>
                <div class="btn-row">
                    <button class="btn off-work" id="btnOffWork">🏠 打卡下班</button>
                    <button class="btn overtime-btn" id="btnOvertime">💼 自愿加班</button>
                </div>
            `;
            document.getElementById('btnOffWork').onclick = handleSuccess;
            document.getElementById('btnOvertime').onclick = () => handleFail('点了自愿加班');
        }

        // =============================================
        // b - 颜色欺诈
        // =============================================
        function renderColorSwap(box) {
            box.innerHTML = `
                <h3>考勤确认</h3>
                <div class="subtitle">请确认操作</div>
                <div class="modal-content">请选择您要执行的操作：</div>
                <div class="btn-row">
                    <button class="btn off-work disguised" id="btnOffWork">🏠 打卡下班</button>
                    <button class="btn overtime-btn disguised" id="btnOvertime">💼 自愿加班</button>
                </div>
            `;
            document.getElementById('btnOffWork').onclick = handleSuccess;
            document.getElementById('btnOvertime').onclick = () => handleFail('被颜色误导点了加班');
        }

        // =============================================
        // c - 倒计时压迫
        // =============================================
        function renderCountdown(box) {
            box.innerHTML = `
                <h3>考勤确认</h3>
                <div class="subtitle">超时将自动处理</div>
                <div class="countdown-bar" id="countdownBar" style="width:100%;"></div>
                <div class="modal-content" id="countdownText">剩余 3 秒</div>
                <div class="btn-row">
                    <button class="btn off-work" id="btnOffWork">🏠 打卡下班</button>
                    <button class="btn overtime-btn" id="btnOvertime">💼 自愿加班</button>
                </div>
            `;
            let cdInterval;
            document.getElementById('btnOffWork').onclick = () => { clearInterval(cdInterval); handleSuccess(); };
            document.getElementById('btnOvertime').onclick = () => { clearInterval(cdInterval); handleFail('点了加班'); };
            let remaining = 2;
            const bar = document.getElementById('countdownBar');

                        if (currentY > vpH - bh) { currentY = vpH - bh; currentX += (Math.random() - 0.5) * 150; }

                    const vpW = window.innerWidth, vpH = window.innerHeight, bw = btnRect.width, bh = btnRect.height;
                    if (currentX < 0) { currentX = 0; autoAngle = Math.PI - autoAngle; currentY += (Math.random() - 0.5) * 100; }

                    el.addEventListener('click', function(e) { e.stopPropagation(); if (data.checked || allDone) return;
                        data.checked = true;
                        el.textContent = '✓';
                        el.style.background = '#4CAF50';
                        el.style.color = '#fff';
                        el.style.borderColor = '#4CAF50';
                        checkedTotal++; const rem = TOTAL - checkedTotal; const countEl = document.getElementById('checkedCountK');
                        countEl.textContent = rem;
                        countEl.style.color = rem <= 3 ? '#4CAF50' : rem <= 10 ? '#ff9800' : '#e74c3c'; if (checkedTotal >= TOTAL && !allDone) { allDone = true;
                            setTimeout(() => { btns.forEach(b => b.el.remove());
                                btns.length = 0;
                                cancelAnimationFrame(animFrameId);
                                document.getElementById('finalOffWorkArea').style.display = 'block';
                                document.getElementById('btnFinalOffWork').onclick = handleSuccess;
                                document.getElementById('checkedCountK').textContent = '0';
                                document.getElementById('checkedCountK').style.color = '#4CAF50'; }, 500); } });
                    document.body.appendChild(el);
                    btns.push(data);
                }

                const GRAVITY = 350;
                let last = performance.now();

                function loop(ts) {
                    if (allDone) return;
                    const dt = Math.min(1 / 30, (ts - last) / 1000);
                    last = ts;
                    const m = modal;
                    for (const b of btns) { b.vy += GRAVITY * dt;
                        b.x += b.vx * dt;
                        b.y += b.vy * dt; }
                    for (const b of btns) {
                        if (b.x + SIZE > m.left && b.x < m.right && b.y + SIZE > m.top && b.y < m.bottom) {
                            const ol = b.x + SIZE - m.left, or = m.right - b.x, ot = b.y + SIZE - m.top, ob = m.bottom - b.y;
                            const min = Math.min(ol, or, ot, ob);
                            if (min === ot) { b.y = m.top - SIZE;
                                b.vy = -Math.abs(b.vy) * 0.5; } else if (min === ob) { b.y = m.bottom;
                                b.vy = Math.abs(b.vy) * 0.5; } else if (min === ol) { b.x = m.left - SIZE;
                                b.vx = -Math.abs(b.vx) * 0.5; } else { b.x = m.right;
                                b.vx = Math.abs(b.vx) * 0.5; }
                        }
                    }
                    for (let i = 0; i < btns.length; i++) {
                        for (let j = i + 1; j < btns.length; j++) {
                            const a = btns[i], b2 = btns[j];
                            const dx = (a.x + HALF) - (b2.x + HALF), dy = (a.y + HALF) - (b2.y + HALF);
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist < SIZE && dist > 0.001) {
                                const nx = dx / dist, ny = dy / dist;
                                const overlap = Math.max(0, SIZE - dist + 0.5);
                                a.x += nx * overlap * 0.5;
                                a.y += ny * overlap * 0.5;
                                b2.x -= nx * overlap * 0.5;
                                b2.y -= ny * overlap * 0.5;
                                const dvx = a.vx - b2.vx, dvy = a.vy - b2.vy, vn = dvx * nx + dvy * ny;
                                if (vn < 0) { const e = 0.8, J = -(1 + e) * vn / 2;
                                    a.vx += J * nx;
                                    a.vy += J * ny;
                                    b2.vx -= J * nx;
                                    b2.vy -= J * ny; }
                            }
                        }
                    }
                    for (const b of btns) {
                        if (b.x < 0) { b.x = 0;
                            b.vx = Math.abs(b.vx) * 0.5; }
                        if (b.x > vpW - SIZE) { b.x = vpW - SIZE;
                            b.vx = -Math.abs(b.vx) * 0.5; }
                        if (b.y > vpH + 50) { b.y = -SIZE - Math.random() * 400;
                            b.x = 10 + Math.random() * (vpW - SIZE - 20);
                            b.vy = 5 + Math.random() * 20;
                            b.vx = (Math.random() - 0.5) * 120; }
                        if (b.y < -700) { b.y = -SIZE - Math.random() * 200;
                            b.vy = Math.abs(b.vy) * 0.5; }
                        b.el.style.left = b.x + 'px';
                        b.el.style.top = b.y + 'px';
                    }
                    animFrameId = requestAnimationFrame(loop);
                }
                animFrameId = requestAnimationFrame(loop);
            };
            levelTimers.push({ type: 'cleanup', fn: () => { if (animFrameId) cancelAnimationFrame(animFrameId);
                    btns.forEach(b => b.el.remove());
                    btns.length = 0; } });
        }

        // ---------- 高级m：波次射击+BOSS ----------
        function renderShooter(box) {
            // 确保弹窗可见
            document.getElementById('modalOverlay').classList.remove('hidden');
            const modalBox = document.getElementById('modalBox');
            modalBox.style.cssText = '';
            
            const isMobile = /Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent) || ('ontouchstart' in window && window.innerWidth < 768);
            
            if (isMobile) {
                modalBox.style.maxWidth = '95vw';
                modalBox.style.maxHeight = 'none';
                modalBox.style.overflowY = 'visible';
            } else {
                modalBox.style.maxWidth = '440px';
                modalBox.style.maxHeight = 'none';
                modalBox.style.overflowY = 'visible';
            }
            box.innerHTML = `
                <h3>🎯 消灭所有加班怪</h3>
                <div class="subtitle">鼠标/手指左右移动炮台 | 自动发射</div>
                        <div class="modal-content" style="padding:0;max-height:none;overflow:visible;">
                    <canvas id="shooterCanvas" style="display:block;margin:0 auto;border-radius:8px;background:#1a1a2e;touch-action:none;"></canvas>
                </div>
                <div style="text-align:center;margin-top:4px;font-size:11px;color:#888;">
                    第 <span id="waveNum" style="font-weight:bold;color:#f39c12;">1</span> 波 &nbsp;|&nbsp;
                    剩余：<span id="enemyCount" style="font-weight:bold;color:#e74c3c;">0</span>
                </div>
            `;

            const canvas = document.getElementById('shooterCanvas');
            const ctx = canvas.getContext('2d');
            const countDisplay = document.getElementById('enemyCount');
            const waveDisplay = document.getElementById('waveNum');

            const W = isMobile ? Math.min(280, window.innerWidth - 80) : 350;
            const H = isMobile ? 380 : 420;
            canvas.width = W;
            canvas.height = H;

            const PLAYER_R = 15;
            const BULLET_R = 3;
            const BULLET_SPEED = 6;
            const FIRE_RATE = 6;
            const ENEMY_W = 34;
            const ENEMY_H = 26;

            let playerX = W / 2;
            let playerY = H - 40;
            let bullets = [];
            let enemies = [];
            let gameOver = false;
            let frameCount = 0;
            let animId = null;

            // 波次系统
            let currentWave = 0;
            let waveEnemiesRemaining = 0;
            let waveEnemiesSpawned = 0;
            let spawnTimer = 0;
            let spawnInterval = 40;
            let waveActive = false;
            let bossAlive = false;

            // 波次定义
            const waves = [
                { name: '第1波', count: 8, hp: 3, speed: 0.8, spawnInterval: 45, isBoss: false },
                { name: '第2波', count: 10, hp: 4, speed: 1.0, spawnInterval: 40, isBoss: false },
                { name: '第3波', count: 12, hp: 5, speed: 1.2, spawnInterval: 35, isBoss: false },
                { name: '第4波', count: 14, hp: 6, speed: 1.4, spawnInterval: 30, isBoss: false },
                { name: '第5波', count: 16, hp: 7, speed: 1.6, spawnInterval: 25, isBoss: false },
                { name: 'BOSS波', count: 1, hp: 300, speed: 0.19, spawnInterval: 0, isBoss: true },
            ];

            let boss = null;

            function spawnEnemy(hp, speed, isBoss) {
                return {
                    x: Math.random() * (W - ENEMY_W),
                    y: -ENEMY_H - Math.random() * 60,
                    speed: speed + Math.random() * 0.3,
                    hp: hp,
                    maxHp: hp,
                    isBoss: isBoss,
                    bossW: isBoss ? 80 : ENEMY_W,
                    bossH: isBoss ? 60 : ENEMY_H,
                    bossPhase: 0,
                    bossDir: 1,
                };
            }

            function startWave(waveIndex) {
                if (waveIndex >= waves.length) {
                    // 全部通关
                    gameOver = true;
                    cancelAnimationFrame(animId);
                    setTimeout(() => handleSuccess(), 500);
                    return;
                }
                currentWave = waveIndex;
                const wave = waves[waveIndex];
                waveDisplay.textContent = wave.name;
                waveDisplay.style.color = wave.isBoss ? '#e74c3c' : '#f39c12';
                waveEnemiesRemaining = wave.count;
                waveEnemiesSpawned = 0;
                spawnInterval = wave.spawnInterval;
                spawnTimer = 0;
                waveActive = true;
                bossAlive = wave.isBoss;
                countDisplay.textContent = wave.count;
                countDisplay.style.color = '#e74c3c';
            }

            startWave(0);

            // 炮台控制
            function updatePlayer(e) {
                const rect = canvas.getBoundingClientRect();
                const cx = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
                playerX = Math.max(PLAYER_R, Math.min(W - PLAYER_R, cx));
            }

            canvas.addEventListener('mousemove', updatePlayer);
            canvas.addEventListener('touchmove', (e) => { e.preventDefault();
                updatePlayer(e); }, { passive: false });
            canvas.addEventListener('touchstart', (e) => { e.preventDefault();
                updatePlayer(e); }, { passive: false });

            function gameLoop() {
                if (gameOver) return;
                frameCount++;

                ctx.clearRect(0, 0, W, H);
                ctx.fillStyle = '#1a1a2e';
                ctx.fillRect(0, 0, W, H);

                // 网格
                ctx.strokeStyle = 'rgba(255,255,255,0.03)';
                for (let gx = 0; gx < W; gx += 30) { ctx.beginPath();
                    ctx.moveTo(gx, 0);
                    ctx.lineTo(gx, H);
                    ctx.stroke(); }
                for (let gy = 0; gy < H; gy += 30) { ctx.beginPath();
                    ctx.moveTo(0, gy);
                    ctx.lineTo(W, gy);
                    ctx.stroke(); }

                // 生成敌人
                if (waveActive) {
                    spawnTimer++;
                    if (spawnTimer >= spawnInterval && waveEnemiesSpawned < waves[currentWave].count) {
                        spawnTimer = 0;
                        const wave = waves[currentWave];
                        enemies.push(spawnEnemy(wave.hp, wave.speed, wave.isBoss));
                        waveEnemiesSpawned++;
                    }
                }

                // 发射子弹（第5波三列，其他两列）
                if (frameCount % FIRE_RATE === 0 && (waveActive || enemies.length > 0)) {
                    if (currentWave === 4 || currentWave === 5) {
                        // 第5波三列
                        bullets.push(
                            { x: playerX - 10, y: playerY, vx: 0, vy: -BULLET_SPEED },
                            { x: playerX, y: playerY, vx: 0, vy: -BULLET_SPEED },
                            { x: playerX + 10, y: playerY, vx: 0, vy: -BULLET_SPEED }
                        );
                    } else {
                        bullets.push(
                            { x: playerX - 5, y: playerY, vx: 0, vy: -BULLET_SPEED },
                            { x: playerX + 5, y: playerY, vx: 0, vy: -BULLET_SPEED }
                        );
                    }
                }

                // 更新子弹
                for (let i = bullets.length - 1; i >= 0; i--) {
                    bullets[i].y += bullets[i].vy;
                    if (bullets[i].y < -20 || bullets[i].y > H + 20) bullets.splice(i, 1);
                }

                // 更新敌人
                for (let i = enemies.length - 1; i >= 0; i--) {
                    const enemy = enemies[i];
                    enemy.y += enemy.speed;

                    // BOSS左右移动
                    if (enemy.isBoss) {
                        enemy.x += enemy.bossDir * 0.19;
                        if (enemy.x < 0) enemy.bossDir = 1;
                        if (enemy.x > W - enemy.bossW) enemy.bossDir = -1;
                        enemy.bossPhase += 0.05;

                        // BOSS疯狂反击
                        if (frameCount % 90 === 0) {
                            for (let k = -2; k <= 2; k++) {
                                enemies.push({
                                    x: enemy.x + enemy.bossW / 2 - ENEMY_W / 2 + k * 20,
                                    y: enemy.y + enemy.bossH,
                                    speed: 0.8 + Math.abs(k) * 0.3,
                                    hp: 2,
                                    maxHp: 2,
                                    isBoss: false,
                                    bossW: ENEMY_W,
                                    bossH: ENEMY_H,
                                    bossPhase: 0,
                                    bossDir: 1,
                                });
                            }
                        }
                    }

                    const ew = enemy.isBoss ? enemy.bossW : ENEMY_W;
                    const eh = enemy.isBoss ? enemy.bossH : ENEMY_H;

                    // 到达底部
                    if (enemy.y > H) {
                        gameOver = true;
                        handleFail('加班怪入侵成功');
                        return;
                    }

                    // 子弹碰撞
                    for (let j = bullets.length - 1; j >= 0; j--) {
                        const b = bullets[j];
                        if (b.x > enemy.x && b.x < enemy.x + ew &&
                            b.y > enemy.y && b.y < enemy.y + eh) {
                            bullets.splice(j, 1);
                            enemy.hp--;
                            if (enemy.hp <= 0) {
                                enemies.splice(i, 1);
                                waveEnemiesRemaining--;
                                countDisplay.textContent = waveEnemiesRemaining;

                                // 检查波次是否结束
                                if (waveEnemiesRemaining <= 0 && enemies.length === 0) {
                                    waveActive = false;
                                    bossAlive = false;
                                    setTimeout(() => startWave(currentWave + 1), 800);
                                }
                            }
                            break;
                        }
                    }
                }

                // 绘制敌人
                for (const enemy of enemies) {
                    const ew = enemy.isBoss ? enemy.bossW : ENEMY_W;
                    const eh = enemy.isBoss ? enemy.bossH : ENEMY_H;

                    if (enemy.isBoss) {
                        // BOSS发光效果
                        const glow = Math.sin(enemy.bossPhase) * 0.3 + 0.7;
                        ctx.shadowColor = '#e74c3c';
                        ctx.shadowBlur = 15 * glow;
                        ctx.fillStyle = '#c0392b';
                        ctx.fillRect(enemy.x, enemy.y, ew, eh);
                        ctx.shadowBlur = 0;
                        ctx.strokeStyle = '#ff6b6b';
                        ctx.lineWidth = 3;
                        ctx.strokeRect(enemy.x, enemy.y, ew, eh);
                        ctx.fillStyle = '#fff';
                        ctx.font = 'bold 14px sans-serif';
                        ctx.textAlign = 'center';
                        ctx.fillText('加班王', enemy.x + ew / 2, enemy.y + eh / 2 + 6);
                    } else {
                        ctx.fillStyle = '#e74c3c';
                        ctx.fillRect(enemy.x, enemy.y, ew, eh);
                        ctx.strokeStyle = '#c0392b';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(enemy.x, enemy.y, ew, eh);
                        ctx.fillStyle = '#fff';
                        ctx.font = 'bold 10px monospace';
                        ctx.textAlign = 'center';
                        ctx.fillText('加班', enemy.x + ew / 2, enemy.y + eh / 2 + 4);
                    }

                    // 血条
                    const hpPct = enemy.hp / enemy.maxHp;
                    const barY = enemy.y - 8;
                    const barW = ew;
                    ctx.fillStyle = '#333';
                    ctx.fillRect(enemy.x, barY, barW, 5);
                    ctx.fillStyle = hpPct > 0.5 ? '#4CAF50' : hpPct > 0.25 ? '#f39c12' : '#e74c3c';
                    ctx.fillRect(enemy.x, barY, barW * hpPct, 5);
                }

                // 绘制子弹
                for (const b of bullets) {
                    ctx.fillStyle = '#f1c40f';
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, BULLET_R, 0, Math.PI * 2);
                    ctx.fill();
                }

                // 绘制炮台
                ctx.fillStyle = '#4CAF50';
                ctx.beginPath();
                ctx.arc(playerX, playerY, PLAYER_R, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 10px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('炮', playerX, playerY + 4);

                // 炮管
                ctx.fillStyle = '#388E3C';
                ctx.fillRect(playerX - 2, playerY - PLAYER_R - 10, 4, 12);

                animId = requestAnimationFrame(gameLoop);
            }

            animId = requestAnimationFrame(gameLoop);

            levelTimers.push({
                type: 'cleanup',
                fn: () => {
                    if (animId) cancelAnimationFrame(animId);
                    gameOver = true;
                }
            });
        }

        // =============================================
        // n - 瞄准射击（探照灯+靶子）
        // =============================================
        function renderFPS(box) {

            function updatePlayer() { if (gameOver) return; let mx = 0, my = 0; if (keys['ArrowLeft'] || keys['a']) mx -= 1; if (keys['ArrowRight'] || keys['d']) mx += 1; if (keys['ArrowUp'] || keys['w']) my -= 1; if (keys['ArrowDown'] || keys['s']) my += 1; if (mx !== 0 || my !== 0) { const len = Math.sqrt(mx * mx + my * my);
                    playerX += (mx / len) * 3.5;
                    playerY += (my / len) * 3.5;
                    playerX = Math.max(PLAYER_W / 2, Math.min(vpW - PLAYER_W / 2, playerX));
                    playerY = Math.max(PLAYER_H / 2, Math.min(vpH - PLAYER_H / 2, playerY)); } }
            if (isMobile) { const ja = document.createElement('div');
                ja.style.cssText = 'position:absolute;bottom:40px;left:40px;width:120px;height:120px;z-index:5;'; const jb = document.createElement('div');
                jb.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.3);';
                ja.appendChild(jb); const js = document.createElement('div');
                js.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.5);pointer-events:none;';
                ja.appendChild(js); let jActive = false, jBaseX = 0, jBaseY = 0, joyDX = 0, joyDY = 0;
                function onTouchStart(e) { e.preventDefault(); const r = ja.getBoundingClientRect();
                    jBaseX = r.left + r.width / 2;
                    jBaseY = r.top + r.height / 2;
                    jActive = true;
                    updateJoy(e.touches[0]); }
                function onTouchMove(e) { e.preventDefault(); if (jActive) updateJoy(e.touches[0]); }
                function onTouchEnd() { jActive = false;
                    joyDX = 0;
                    joyDY = 0;
                    js.style.transform = 'translate(-50%, -50%)'; }
                ja.addEventListener('touchstart', onTouchStart);
                ja.addEventListener('touchmove', onTouchMove);
                ja.addEventListener('touchend', onTouchEnd);
                function updateJoy(t) { const dx = t.clientX - jBaseX, dy = t.clientY - jBaseY; const dist = Math.sqrt(dx * dx + dy * dy); const maxD = 40, cd = Math.min(dist, maxD); const ang = Math.atan2(dy, dx);
                    js.style.left = (60 + Math.cos(ang) * cd) + 'px';
                    js.style.top = (60 + Math.sin(ang) * cd) + 'px';
                    joyDX = dist > 5 ? Math.cos(ang) * (cd / maxD) : 0;
                    joyDY = dist > 5 ? Math.sin(ang) * (cd / maxD) : 0; } const mobileMove = setInterval(() => { if (gameOver) { clearInterval(mobileMove); return; } if (joyDX !== 0 || joyDY !== 0) { playerX += joyDX * 3.5;
                        playerY += joyDY * 3.5;
                        playerX = Math.max(PLAYER_W / 2, Math.min(vpW - PLAYER_W / 2, playerX));
                        playerY = Math.max(PLAYER_H / 2, Math.min(vpH - PLAYER_H / 2, playerY)); } }, 16);
                levelTimers.push({ type: 'interval', id: mobileMove });
                container.appendChild(ja); }

            function gameLoop() {
                if (gameOver) return;
                updatePlayer();
                survived++; if (invincible > 0) invincible--;
                const pct = Math.min(100, (survived / SURVIVE_TIME) * 100);
                progressFill.style.width = pct + '%'; const remaining = Math.max(0, Math.ceil((SURVIVE_TIME - survived) / 60));
                progressText.textContent = remaining > 0 ? `请等待 ${remaining} 秒` : '请点击下班按钮'; if (survived >= SURVIVE_TIME) { exitBtn.style.boxShadow = '0 0 50px rgba(76,175,80,1)';
                    exitBtn.style.fontSize = '18px';
                    exitBtn.style.opacity = '1';
                    exitBtn.textContent = '🏠 打卡下班'; } else { exitBtn.style.opacity = '0.5';
                    exitBtn.textContent = '🔒 ' + remaining + 's'; } const spawnRate = Math.min(0.035, 0.015 + survived * 0.0001); if (Math.random() < spawnRate) meetings.push(spawnMeeting()); for (let i = meetings.length - 1; i >= 0; i--) { meetings[i].x -= meetings[i].speed; if (meetings[i].x < -MEETING_W - 100) meetings.splice(i, 1); } if (invincible <= 0) { for (const m of meetings) { if (playerX - PLAYER_W / 2 < m.x + MEETING_W && playerX + PLAYER_W / 2 > m.x && playerY - PLAYER_H / 2 < m.y + MEETING_H && playerY + PLAYER_H / 2 > m.y) { hp--;
                        invincible = 90; const hearts = ['💀', '❤️', '❤️❤️', '❤️❤️❤️'];
                        hpDisplay.textContent = hearts[hp] || '💀'; if (hp <= 0) { gameOver = true;
                            resultMsg.textContent = '❌ 系统异常';
                            resultMsg.style.color = '#e74c3c';
                            resultMsg.style.display = 'block';
                            setTimeout(() => { cleanup();
                                handleFail('系统异常'); }, 800); return; }
                        playerX = vpW / 2;
                        playerY = vpH / 2; break; } } } if (survived >= SURVIVE_TIME && playerX - PLAYER_W / 2 < exitX + exitW && playerX + PLAYER_W / 2 > exitX && playerY - PLAYER_H / 2 < exitY + exitH && playerY + PLAYER_H / 2 > exitY) { gameOver = true;
                    resultMsg.textContent = '✅ 打卡成功';
                    resultMsg.style.color = '#4CAF50';
                    resultMsg.style.display = 'block';
                    setTimeout(() => { cleanup();
                        handleSuccess(); }, 800); return; }
                ctx.clearRect(0, 0, vpW, vpH);
                ctx.fillStyle = 'rgba(13,13,26,0.3)';
                ctx.fillRect(0, 0, vpW, vpH); for (const m of meetings) { ctx.fillStyle = m.color;
                    ctx.fillRect(m.x, m.y, MEETING_W, MEETING_H);
                    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(m.x, m.y, MEETING_W, MEETING_H);
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 13px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('📋 ' + m.name, m.x + MEETING_W / 2, m.y + MEETING_H / 2 + 5); }
                ctx.fillStyle = invincible > 0 ? 'rgba(241,196,15,0.5)' : '#f1c40f';
                ctx.beginPath();
                ctx.arc(playerX, playerY, PLAYER_W / 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.font = '14px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('👤', playerX, playerY + 5);
                requestAnimationFrame(gameLoop);
            }
            requestAnimationFrame(gameLoop);
            function cleanup() { document.removeEventListener('keydown', onKeyDown);
                document.removeEventListener('keyup', onKeyUp); if (container.parentNode) container.remove(); }
            container.appendChild(canvas);
            document.body.appendChild(container); const keyLoop = setInterval(() => { if (gameOver) { clearInterval(keyLoop); return; }
                updatePlayer(); }, 16);
            levelTimers.push({ type: 'cleanup', fn: cleanup });
            levelTimers.push({ type: 'interval', id: keyLoop });
        }

        // =============================================
        // q - 重力抽屉
        // =============================================
        function renderGravityDrawer(box) {
            const isMobile = /Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent) || ('ontouchstart' in window && window.innerWidth < 768);
            box.innerHTML = '';
            box.style.cssText = 'position:fixed;top:50%;left:50%;width:300px;height:240px;transform:translate(-50%,-50%) rotate(0deg);border-radius:16px;background:#2c3e50;overflow:visible;box-shadow:0 10px 40px rgba(0,0,0,.35);z-index:1001;cursor:grab;user-select:none;';
            const BOX_W = 300, BOX_H = 240, BTN_W = 100, BTN_H = 38;
            let currentAngle = 0, isDragging = false, gameOver = false;
            let dragStartX = 0, dragStartY = 0, dragCenterX = 0, dragCenterY = 0, dragStartAngle = 0;
            const TOTAL = 6;
            const targetIndex = Math.floor(Math.random() * TOTAL);
            const drawers = [];
            const railLayer = document.createElement('div');
            railLayer.style.cssText = 'position:absolute;inset:0;overflow:visible;z-index:1;';
            box.appendChild(railLayer);
            const mask = document.createElement('div');
            mask.style.cssText = 'position:absolute;inset:0;border-radius:16px;background:#2c3e50;z-index:3;pointer-events:none;';
            box.appendChild(mask);
            const title = document.createElement('div');
            title.textContent = '📋 考勤面板';
            title.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:18px;font-weight:bold;z-index:4;pointer-events:none;';
            box.appendChild(title);
            const config = [
                { edge: 'top', slot: -1 }, { edge: 'top', slot: 1 }, { edge: 'bottom', slot: -1 }, { edge: 'bottom', slot: 1 }, { edge: 'left' }, { edge: 'right' }
            ];
            const V_BTN_W = 38, V_BTN_H = 100;
            for (let i = 0; i < TOTAL; i++) { const c = config[i]; const isTarget = i === targetIndex; const btn = document.createElement('button');
                const isVertical = (c.edge === 'top' || c.edge === 'bottom');
                const bw = isVertical ? V_BTN_W : BTN_W;
                const bh = isVertical ? V_BTN_H : BTN_H;
                btn.textContent = isTarget ? '🏠 打卡下班' : '💼 自愿加班';
                btn.style.cssText = `position:absolute;width:${bw}px;height:${bh}px;border:none;border-radius:6px;background:#4CAF50;color:#fff;font-size:${isVertical ? '11' : '12'}px;font-weight:bold;cursor:pointer;z-index:2;${isVertical ? 'writing-mode:vertical-rl;letter-spacing:2px;' : ''}`;
                btn.onclick = e => { e.stopPropagation(); if (gameOver || isDragging) return;
                    gameOver = true;
                    cleanup(); if (isTarget) handleSuccess(); else handleFail('选择错误'); };
                railLayer.appendChild(btn);
                drawers.push({ btn, edge: c.edge, slot: c.slot || 0, bw, bh }); }

            function updateDrawers(angleDeg) { const rad = angleDeg * Math.PI / 180; const gx = Math.sin(rad); const gy = Math.cos(rad); for (const d of drawers) { let ox = 0, oy = 0, baseX = 0, baseY = 0, reveal = 0; switch (d.edge) { case 'top': ox = 0;
                        oy = -1;
                        baseX = BOX_W / 2 + d.slot * 50 - d.bw / 2;
                        baseY = 0; reveal = d.bh - 5; break; case 'bottom': ox = 0;
                        oy = 1;
                        baseX = BOX_W / 2 + d.slot * 50 - d.bw / 2;
                        baseY = BOX_H - d.bh; reveal = d.bh - 5; break; case 'left': ox = -1;
                        oy = 0;
                        baseX = 0;
                        baseY = BOX_H / 2 - d.bh / 2; reveal = d.bw - 5; break; case 'right': ox = 1;
                        oy = 0;
                        baseX = BOX_W - d.bw;
                        baseY = BOX_H / 2 - d.bh / 2; reveal = d.bw - 5; break; } let dot = ox * gx + oy * gy;
                    dot = Math.max(0, dot); const slide = dot * reveal;
                    d.btn.style.left = `${baseX + ox * slide}px`;
                    d.btn.style.top = `${baseY + oy * slide}px`; } }

            function getCenter() { const r = box.getBoundingClientRect(); return { x: r.left + r.width / 2, y: r.top + r.height / 2 }; }
            if (!isMobile) { box.onmousedown = e => { if (e.target.closest('button')) return;
                    isDragging = true; const c = getCenter();
                    dragCenterX = c.x;
                    dragCenterY = c.y;
                    dragStartX = e.clientX;
                    dragStartY = e.clientY;
                    dragStartAngle = currentAngle; };
                document.onmousemove = e => { if (!isDragging) return; const a1 = Math.atan2(dragStartY - dragCenterY, dragStartX - dragCenterX); const a2 = Math.atan2(e.clientY - dragCenterY, e.clientX - dragCenterX);
                    currentAngle = dragStartAngle + (a2 - a1) * 180 / Math.PI;
                    box.style.transform = `translate(-50%,-50%) rotate(${currentAngle}deg)`;
                    updateDrawers(currentAngle); };
                document.onmouseup = () => (isDragging = false); }
            if (isMobile && window.DeviceOrientationEvent) { box.style.width = 'min(92vw, 320px)';
                box.style.height = '200px';
                box.style.borderRadius = '14px'; let tiltX = 0, tiltY = 0; const SMOOTH = 0.12;
                function handleTilt(e) { if (gameOver) return; let gx = e.gamma || 0; let gy = e.beta || 0;
                    gx = Math.max(-45, Math.min(45, gx));
                    gy = Math.max(-45, Math.min(45, gy)); const targetX = gx / 45; const targetY = gy / 45;
                    tiltX += (targetX - tiltX) * SMOOTH;
                    tiltY += (targetY - tiltY) * SMOOTH;
                    currentAngle = Math.atan2(tiltX, tiltY) * 180 / Math.PI;
                    updateDrawers(currentAngle); } if (typeof DeviceOrientationEvent.requestPermission === 'function') { document.addEventListener('touchstart', function init() { DeviceOrientationEvent.requestPermission().then(state => { if (state === 'granted') window.addEventListener('deviceorientation', handleTilt); }).catch(() => {}); }, { once: true }); } else { window.addEventListener('deviceorientation', handleTilt); }
                }
            updateDrawers(0);
            
            function cleanup() {
                window.removeEventListener('deviceorientation', handleTilt);
                const modalBox = document.getElementById('modalBox');
                if (modalBox) {
                    modalBox.style.cssText = '';
                }
            }

            levelTimers.push({ type: 'cleanup', fn: cleanup });
        }

        // =============================================
        // 初始化
        // =============================================
        function init() {
            generateLevels();
            updateStatusDisplay();
            document.getElementById('modalOverlay').addEventListener('click', function(e) {
                if (e.target === this) { e.stopPropagation(); }
            });
        }
        init();
    </script>
